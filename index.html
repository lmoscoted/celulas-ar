<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR - Clase Bíblica</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    /* Ajuste para evitar que la barra del navegador tape el visor */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
    model-viewer { width: 100%; height: 100%; }
    
    /* Botón más arriba (bottom: 80px en lugar de 30px) */
    .ar-button { 
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); 
      padding: 14px 24px; background-color: #212121; color: white; 
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;
    }
  </style>
</head>
<body>

  <model-viewer 
    src= "https://dl.dropboxusercontent.com/scl/fi/nhhes9kqxh1mbzk6blvxa/model.glb?rlkey=n60pw8eei3x68nbomgopivrlx&st=bfohwc3m&dl=0"
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    ar-scale="auto"
    camera-controls 
    shadow-intensity="1"
    environment-image="neutral"
    auto-rotate>
    
    <button slot="ar-button" class="ar-button">
      📍 Ver en mi mesa (AR)
    </button>
    
  </model-viewer>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR - Clase Bíblica</title>
  
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  
  <style>
    /* Estilos para que el visor ocupe toda la pantalla del celular */
    body { margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; font-family: sans-serif; }
    model-viewer { width: 100vw; height: 100vh; }
    
    /* Estilo del botón que activa la cámara */
    .ar-button { 
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
      padding: 14px 24px; background-color: #212121; color: white; 
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;
    }
  </style>
</head>
<body>

  <model-viewer 
    src="the_ark_of_the_covenant.glb" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    shadow-intensity="1"
    environment-image="neutral"
    auto-rotate>
    
    <button slot="ar-button" class="ar-button">
      📍 Ver en mi mesa (AR)
    </button>
    
  </model-viewer>

</body>
</html>
